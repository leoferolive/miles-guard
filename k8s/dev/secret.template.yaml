# Template APENAS — NÃO aplique este arquivo. Os segredos reais devem ser
# criados out-of-band via `kubectl create secret`. Exemplos:
#
#   kubectl create secret generic nossoradar-secrets \
#     --namespace nossoradar-dev \
#     --from-literal=DATABASE_URL='postgresql://nossoradar:SENHA@nossoradar-postgres:5432/nossoradar' \
#     --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
#     --from-literal=GOOGLE_CLIENT_ID='...apps.googleusercontent.com' \
#     --from-literal=GOOGLE_CLIENT_SECRET='...' \
#     --from-literal=TELEGRAM_BOT_TOKEN='...' \
#     --from-literal=TELEGRAM_CHAT_ID='...' \
#     --from-literal=ALLOWED_EMAILS='leoferolive@gmail.com'
#
#   kubectl create secret generic nossoradar-postgres-secrets \
#     --namespace nossoradar-dev \
#     --from-literal=POSTGRES_USER=nossoradar \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=POSTGRES_DB=nossoradar
#
# IMPORTANTE: POSTGRES_USER/PASSWORD/DB devem casar com o DATABASE_URL acima.
# Rotação: `kubectl edit secret nossoradar-secrets -n nossoradar-dev` e depois
# `kubectl rollout restart deployment/nossoradar-web deployment/nossoradar-worker -n nossoradar-dev`.
#
# GOOGLE_CLIENT_ID/SECRET: reaproveitar a credencial do nossalista (ADR-0005) e
# adicionar o redirect URI https://nossoradar-dev.leoferolive.com.br/api/auth/google/callback
# aos URIs autorizados no Google Cloud Console.
---
apiVersion: v1
kind: Secret
metadata:
  name: nossoradar-secrets
  namespace: nossoradar-dev
type: Opaque
stringData:
  DATABASE_URL: 'REPLACE_ME'
  JWT_SECRET: 'REPLACE_ME_HEX_32'
  GOOGLE_CLIENT_ID: 'REPLACE_ME'
  GOOGLE_CLIENT_SECRET: 'REPLACE_ME'
  TELEGRAM_BOT_TOKEN: 'REPLACE_ME'
  TELEGRAM_CHAT_ID: 'REPLACE_ME'
  ALLOWED_EMAILS: 'leoferolive@gmail.com'
---
apiVersion: v1
kind: Secret
metadata:
  name: nossoradar-postgres-secrets
  namespace: nossoradar-dev
type: Opaque
stringData:
  POSTGRES_USER: 'nossoradar'
  POSTGRES_PASSWORD: 'REPLACE_ME'
  POSTGRES_DB: 'nossoradar'
