services:
  postgres:
    image: postgres:17-alpine
    container_name: nossoradar-postgres
    environment:
      POSTGRES_DB: nossoradar
      POSTGRES_USER: nossoradar
      POSTGRES_PASSWORD: nossoradar
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nossoradar -d nossoradar']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
