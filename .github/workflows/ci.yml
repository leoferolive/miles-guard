name: CI

# Gates obrigatorios em PR e push para branches de feature.
# Build/test nao precisam de arm64 -> runner padrao (ubuntu-latest), com cache de pnpm.
# (Deploy/build de imagem arm64 vivem em deploy-environment.yml, em runners hospedados ubuntu-24.04-arm.)
on:
  pull_request:
  push:
    branches:
      - master
      - main
      - 'feat/**'
      - 'fix/**'
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test
