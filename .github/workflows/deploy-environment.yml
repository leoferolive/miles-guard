name: Deploy to Environment

# Reusable: builda e publica as DUAS imagens (worker + web) em arm64,
# aplica os manifests k8s do ambiente e atualiza os dois Deployments.
# Espelha nossagrana (api+web -> aqui worker+web) e a esteira do chat-api
# (Tailscale + KUBECONFIG base64 + rollout + smoke /healthz).
on:
  workflow_call:
    inputs:
      environment:
        description: "Ambiente alvo: 'dev' ou 'prod'"
        required: true
        type: string
      tag:
        description: 'Tag da imagem Docker a deployar'
        required: true
        type: string
      ref:
        description: 'Git ref (tag, SHA ou branch) para checkout do codigo'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      resolved_sha: ${{ steps.meta.outputs.resolved_sha }}
      build_time: ${{ steps.meta.outputs.build_time }}
      namespace: ${{ steps.meta.outputs.namespace }}
      worker_deployment: ${{ steps.meta.outputs.worker_deployment }}
      worker_container: ${{ steps.meta.outputs.worker_container }}
      worker_image_repository: ${{ steps.meta.outputs.worker_image_repository }}
      worker_image_uri: ${{ steps.meta.outputs.worker_image_uri }}
      web_deployment: ${{ steps.meta.outputs.web_deployment }}
      web_container: ${{ steps.meta.outputs.web_container }}
      web_image_repository: ${{ steps.meta.outputs.web_image_repository }}
      web_image_uri: ${{ steps.meta.outputs.web_image_uri }}
      smoke_host: ${{ steps.meta.outputs.smoke_host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve deploy metadata
        id: meta
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          RESOLVED_SHA="$(git rev-parse HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Os Deployments e os nomes de container sao os MESMOS em dev e prod
          # (os manifests so divergem no namespace e no pacote de imagem).
          WORKER_DEPLOYMENT="nossoradar-worker"
          WORKER_CONTAINER="worker"
          WEB_DEPLOYMENT="nossoradar-web"
          WEB_CONTAINER="web"

          # Pacotes GHCR SEPARADOS por ambiente (padrao da casa): dev usa o sufixo
          # -dev, isolando o blast radius do prune e protegendo o alvo de rollback
          # de prod (que nunca e podado).
          if [ "$ENVIRONMENT" = "prod" ]; then
            NAMESPACE="nossoradar"
            SMOKE_HOST="nossoradar.leoferolive.com.br"
            WORKER_IMAGE_REPOSITORY="ghcr.io/${OWNER}/nossoradar-worker"
            WEB_IMAGE_REPOSITORY="ghcr.io/${OWNER}/nossoradar-web"
          else
            NAMESPACE="nossoradar-dev"
            SMOKE_HOST="nossoradar-dev.leoferolive.com.br"
            WORKER_IMAGE_REPOSITORY="ghcr.io/${OWNER}/nossoradar-worker-dev"
            WEB_IMAGE_REPOSITORY="ghcr.io/${OWNER}/nossoradar-web-dev"
          fi

          WORKER_IMAGE_URI="${WORKER_IMAGE_REPOSITORY}:${TAG}"
          WEB_IMAGE_URI="${WEB_IMAGE_REPOSITORY}:${TAG}"

          {
            echo "resolved_sha=$RESOLVED_SHA"
            echo "build_time=$BUILD_TIME"
            echo "namespace=$NAMESPACE"
            echo "worker_deployment=$WORKER_DEPLOYMENT"
            echo "worker_container=$WORKER_CONTAINER"
            echo "worker_image_repository=$WORKER_IMAGE_REPOSITORY"
            echo "worker_image_uri=$WORKER_IMAGE_URI"
            echo "web_deployment=$WEB_DEPLOYMENT"
            echo "web_container=$WEB_CONTAINER"
            echo "web_image_repository=$WEB_IMAGE_REPOSITORY"
            echo "web_image_uri=$WEB_IMAGE_URI"
            echo "smoke_host=$SMOKE_HOST"
          } >> "$GITHUB_OUTPUT"

  build-and-push-worker:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: |
            ${{ needs.prepare.outputs.worker_image_repository }}:latest
            ${{ needs.prepare.outputs.worker_image_uri }}
          build-args: |
            APP_VERSION=${{ inputs.tag }}
            GIT_SHA=${{ needs.prepare.outputs.resolved_sha }}
          labels: |
            org.opencontainers.image.title=nossoRadar Worker
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.resolved_sha }}
            org.opencontainers.image.ref.name=${{ inputs.ref }}
            org.opencontainers.image.created=${{ needs.prepare.outputs.build_time }}
          cache-from: type=gha,scope=nossoradar-worker-${{ inputs.environment }}
          cache-to: type=gha,mode=max,scope=nossoradar-worker-${{ inputs.environment }}

  build-and-push-web:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          platforms: linux/arm64
          push: true
          tags: |
            ${{ needs.prepare.outputs.web_image_repository }}:latest
            ${{ needs.prepare.outputs.web_image_uri }}
          build-args: |
            APP_VERSION=${{ inputs.tag }}
            GIT_SHA=${{ needs.prepare.outputs.resolved_sha }}
          labels: |
            org.opencontainers.image.title=nossoRadar Web
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.resolved_sha }}
            org.opencontainers.image.ref.name=${{ inputs.ref }}
            org.opencontainers.image.created=${{ needs.prepare.outputs.build_time }}
          cache-from: type=gha,scope=nossoradar-web-${{ inputs.environment }}
          cache-to: type=gha,mode=max,scope=nossoradar-web-${{ inputs.environment }}

  deploy:
    needs: [prepare, build-and-push-worker, build-and-push-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (manifests k8s)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes --reset

      - name: Configure KUBECONFIG
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          # Aplica tudo do ambiente exceto o secret.template.yaml (modelo, nao real).
          for f in ./k8s/"${ENVIRONMENT}"/*.yaml; do
            case "$f" in
              *secret.template.yaml) echo "skip $f" ;;
              *) kubectl apply -f "$f" ;;
            esac
          done

      - name: Update deployment images and metadata
        env:
          NAMESPACE: ${{ needs.prepare.outputs.namespace }}
          WORKER_DEPLOYMENT: ${{ needs.prepare.outputs.worker_deployment }}
          WORKER_CONTAINER: ${{ needs.prepare.outputs.worker_container }}
          WORKER_IMAGE_URI: ${{ needs.prepare.outputs.worker_image_uri }}
          WEB_DEPLOYMENT: ${{ needs.prepare.outputs.web_deployment }}
          WEB_CONTAINER: ${{ needs.prepare.outputs.web_container }}
          WEB_IMAGE_URI: ${{ needs.prepare.outputs.web_image_uri }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
          RESOLVED_SHA: ${{ needs.prepare.outputs.resolved_sha }}
          BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
        run: |
          set -euo pipefail

          kubectl set image "deployment/${WORKER_DEPLOYMENT}" \
            "${WORKER_CONTAINER}=${WORKER_IMAGE_URI}" \
            -n "$NAMESPACE"

          kubectl set image "deployment/${WEB_DEPLOYMENT}" \
            "${WEB_CONTAINER}=${WEB_IMAGE_URI}" \
            -n "$NAMESPACE"

          for d in "$WORKER_DEPLOYMENT" "$WEB_DEPLOYMENT"; do
            kubectl set env "deployment/${d}" \
              APP_VERSION="${TAG}" \
              APP_GIT_TAG="${TAG}" \
              APP_GIT_SHA="${RESOLVED_SHA}" \
              APP_BUILD_TIME="${BUILD_TIME}" \
              APP_ENVIRONMENT="${ENVIRONMENT}" \
              -n "$NAMESPACE"

            kubectl annotate "deployment/${d}" \
              "deploy.nossoradar/tag=${TAG}" \
              "deploy.nossoradar/sha=${RESOLVED_SHA}" \
              "deploy.nossoradar/build-time=${BUILD_TIME}" \
              --overwrite \
              -n "$NAMESPACE"
          done

      - name: Wait for rollouts
        env:
          NAMESPACE: ${{ needs.prepare.outputs.namespace }}
          WORKER_DEPLOYMENT: ${{ needs.prepare.outputs.worker_deployment }}
          WEB_DEPLOYMENT: ${{ needs.prepare.outputs.web_deployment }}
        run: |
          set -euo pipefail
          kubectl rollout status "deployment/${WORKER_DEPLOYMENT}" -n "$NAMESPACE" --timeout=300s
          kubectl rollout status "deployment/${WEB_DEPLOYMENT}" -n "$NAMESPACE" --timeout=300s

      - name: Smoke test /healthz
        env:
          SMOKE_HOST: ${{ needs.prepare.outputs.smoke_host }}
        run: |
          set -eu
          # O Painel (web) serve /healthz via Ingress; o worker nao e exposto pela borda.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "https://${SMOKE_HOST}/healthz" >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            echo "tentativa $i falhou, repetindo em 5s"
            sleep 5
          done
          echo "::error::healthz nunca retornou 200 para ${SMOKE_HOST}"
          exit 1

      - name: Deployment summary
        if: always()
        env:
          NAMESPACE: ${{ needs.prepare.outputs.namespace }}
          WORKER_DEPLOYMENT: ${{ needs.prepare.outputs.worker_deployment }}
          WEB_DEPLOYMENT: ${{ needs.prepare.outputs.web_deployment }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
          RESOLVED_SHA: ${{ needs.prepare.outputs.resolved_sha }}
          BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set +e
          WORKER_DEPLOYED_IMAGE="$(kubectl get deployment "$WORKER_DEPLOYMENT" -n "$NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)"
          WEB_DEPLOYED_IMAGE="$(kubectl get deployment "$WEB_DEPLOYMENT" -n "$NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)"

          [ -z "$WORKER_DEPLOYED_IMAGE" ] && WORKER_DEPLOYED_IMAGE="indisponivel"
          [ -z "$WEB_DEPLOYED_IMAGE" ] && WEB_DEPLOYED_IMAGE="indisponivel"

          RESULT_LABEL="SUCESSO"
          if [ "$JOB_STATUS" != "success" ]; then
            RESULT_LABEL="FALHA"
          fi

          {
            echo "## Deployment Summary"
            echo
            echo "| Campo | Valor |"
            echo "| --- | --- |"
            echo "| Resultado | $RESULT_LABEL |"
            echo "| Environment | $ENVIRONMENT |"
            echo "| Tag version deployada | \`$TAG\` |"
            echo "| Worker image deployada | \`$WORKER_DEPLOYED_IMAGE\` |"
            echo "| Web image deployada | \`$WEB_DEPLOYED_IMAGE\` |"
            echo "| Git SHA | \`$RESOLVED_SHA\` |"
            echo "| Build time (UTC) | \`$BUILD_TIME\` |"
            echo "| Namespace | \`$NAMESPACE\` |"
          } >> "$GITHUB_STEP_SUMMARY"
